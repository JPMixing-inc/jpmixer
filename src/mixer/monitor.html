<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Monitor Engineer — JPMixer</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="stylesheet" href="monitor.css" />
</head>
<body class="disconnected">

  <header class="mon-header">
    <img src="logo.png" class="brand-logo" alt="JPMixer" />
    <span class="mon-title">Monitor Engineer</span>
    <span class="mon-snapshot" id="monSnapshot">—</span>
    <div class="snap-btns">
      <button class="snap-btn" id="snapPrevBtn" title="Fire Previous Snapshot">⏮</button>
      <button class="snap-btn" id="snapNextBtn" title="Fire Next Snapshot">⏭</button>
    </div>
    <span class="mon-device-count" id="monDeviceCount" style="display:none">0 devices</span>
    <span class="conn-dot" id="connDot"></span>
  </header>

  <div class="mon-grid" id="monGrid"></div>

  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <div class="spinner"></div>
      <p id="overlayMsg">Connecting to console…</p>
    </div>
  </div>

  <script src="monitor.js"></script>
</body>
</html>
