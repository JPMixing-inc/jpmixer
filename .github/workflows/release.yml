name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS arm64 (DMG + PKG)
        run: mkdir -p dist && touch dist/com.jpmixing.oscmixer.pkg && npx electron-builder --mac --arm64 --publish never

      - name: Build macOS x64 (DMG + PKG)
        run: touch dist/com.jpmixing.oscmixer.pkg && npx electron-builder --mac --x64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            dist/*.dmg
            dist/*.pkg
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Windows (NSIS installer)
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: dist/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-artifacts
          path: artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: artifacts/win

      - name: Create / update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/mac/*.pkg
            artifacts/win/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
